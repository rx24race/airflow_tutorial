<svg width="680" height="400" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="340" y="30" font-size="15" font-weight="500" fill="#2C2C2A" text-anchor="middle">Data pipeline types</text>

<!-- ═══════════════════════════════════════════
     LEFT: SNAPSHOT
════════════════════════════════════════════ -->
<rect x="30" y="50" width="295" height="330" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="177" y="76" font-size="13" font-weight="500" fill="#2C2C2A" text-anchor="middle">Snapshot</text>
<text x="177" y="93" font-size="11" fill="#5F5E5A" text-anchor="middle">Full source read on every run</text>

<!-- Source table: all rows highlighted -->
<rect x="55" y="110" width="115" height="130" rx="6" fill="#ffffff" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="112" y="126" font-size="11" fill="#5F5E5A" text-anchor="middle" font-weight="500">Source</text>
<rect x="60" y="132" width="105" height="18" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.4"/>
<text x="112" y="145" font-size="10" fill="#3C3489" text-anchor="middle">row 1  —  Jan 1</text>
<rect x="60" y="154" width="105" height="18" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.4"/>
<text x="112" y="167" font-size="10" fill="#3C3489" text-anchor="middle">row 2  —  Jan 5</text>
<rect x="60" y="176" width="105" height="18" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.4"/>
<text x="112" y="189" font-size="10" fill="#3C3489" text-anchor="middle">row 3  —  Feb 2</text>
<rect x="60" y="198" width="105" height="18" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.4"/>
<text x="112" y="211" font-size="10" fill="#3C3489" text-anchor="middle">row 4  —  Feb 9</text>
<rect x="60" y="220" width="105" height="18" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.4"/>
<text x="112" y="233" font-size="10" fill="#3C3489" text-anchor="middle">row 5  —  Mar 3</text>
<text x="112" y="254" font-size="10" fill="#534AB7" text-anchor="middle" font-style="italic">all rows selected</text>

<!-- arrow source → target -->
<line x1="170" y1="175" x2="200" y2="175" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Target table -->
<rect x="200" y="110" width="105" height="130" rx="6" fill="#ffffff" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="252" y="126" font-size="11" fill="#5F5E5A" text-anchor="middle" font-weight="500">Target</text>
<rect x="205" y="132" width="95" height="18" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.4"/>
<text x="252" y="145" font-size="10" fill="#085041" text-anchor="middle">row 1</text>
<rect x="205" y="154" width="95" height="18" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.4"/>
<text x="252" y="167" font-size="10" fill="#085041" text-anchor="middle">row 2</text>
<rect x="205" y="176" width="95" height="18" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.4"/>
<text x="252" y="189" font-size="10" fill="#085041" text-anchor="middle">row 3</text>
<rect x="205" y="198" width="95" height="18" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.4"/>
<text x="252" y="211" font-size="10" fill="#085041" text-anchor="middle">row 4</text>
<rect x="205" y="220" width="95" height="18" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.4"/>
<text x="252" y="233" font-size="10" fill="#085041" text-anchor="middle">row 5</text>

<!-- Snapshot run labels -->
<text x="55" y="285" font-size="11" font-weight="500" fill="#2C2C2A">Each run:</text>
<text x="55" y="301" font-size="11" fill="#5F5E5A">· Reads entire source table</text>
<text x="55" y="317" font-size="11" fill="#5F5E5A">· Overwrites target fully</text>
<text x="55" y="333" font-size="11" fill="#5F5E5A">· Simple, but costly at scale</text>

<!-- ═══════════════════════════════════════════
     RIGHT: INCREMENTAL
════════════════════════════════════════════ -->
<rect x="355" y="50" width="295" height="330" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="502" y="76" font-size="13" font-weight="500" fill="#2C2C2A" text-anchor="middle">Incremental</text>
<text x="502" y="93" font-size="11" fill="#5F5E5A" text-anchor="middle">Filtered by time range per run</text>

<!-- Source table -->
<rect x="380" y="110" width="115" height="130" rx="6" fill="#ffffff" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="437" y="126" font-size="11" fill="#5F5E5A" text-anchor="middle" font-weight="500">Source</text>
<rect x="385" y="132" width="105" height="18" rx="3" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.4"/>
<text x="437" y="145" font-size="10" fill="#B4B2A9" text-anchor="middle">row 1  —  Jan 1</text>
<rect x="385" y="154" width="105" height="18" rx="3" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.4"/>
<text x="437" y="167" font-size="10" fill="#B4B2A9" text-anchor="middle">row 2  —  Jan 5</text>
<rect x="385" y="176" width="105" height="18" rx="3" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.4"/>
<text x="437" y="189" font-size="10" fill="#B4B2A9" text-anchor="middle">row 3  —  Feb 2</text>
<rect x="385" y="198" width="105" height="18" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.7"/>
<text x="437" y="211" font-size="10" fill="#633806" text-anchor="middle">row 4  —  Feb 9</text>
<rect x="385" y="220" width="105" height="18" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.7"/>
<text x="437" y="233" font-size="10" fill="#633806" text-anchor="middle">row 5  —  Mar 3</text>

<!-- time window bracket -->
<line x1="494" y1="198" x2="494" y2="238" stroke="#854F0B" stroke-width="1"/>
<line x1="494" y1="198" x2="490" y2="198" stroke="#854F0B" stroke-width="1"/>
<line x1="494" y1="238" x2="490" y2="238" stroke="#854F0B" stroke-width="1"/>
<text x="497" y="221" font-size="9" fill="#854F0B">window</text>

<!-- arrow source → target -->
<line x1="495" y1="175" x2="522" y2="175" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Target table -->
<rect x="522" y="110" width="105" height="130" rx="6" fill="#ffffff" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="574" y="126" font-size="11" fill="#5F5E5A" text-anchor="middle" font-weight="500">Target</text>
<rect x="527" y="132" width="95" height="18" rx="3" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.4"/>
<text x="574" y="145" font-size="10" fill="#B4B2A9" text-anchor="middle">row 1</text>
<rect x="527" y="154" width="95" height="18" rx="3" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.4"/>
<text x="574" y="167" font-size="10" fill="#B4B2A9" text-anchor="middle">row 2</text>
<rect x="527" y="176" width="95" height="18" rx="3" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.4"/>
<text x="574" y="189" font-size="10" fill="#B4B2A9" text-anchor="middle">row 3</text>
<rect x="527" y="198" width="95" height="18" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.7"/>
<text x="574" y="211" font-size="10" fill="#633806" text-anchor="middle">row 4  ← new</text>
<rect x="527" y="220" width="95" height="18" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.7"/>
<text x="574" y="233" font-size="10" fill="#633806" text-anchor="middle">row 5  ← new</text>

<!-- Incremental run labels -->
<text x="380" y="285" font-size="11" font-weight="500" fill="#2C2C2A">Each run:</text>
<text x="380" y="301" font-size="11" fill="#5F5E5A">· Reads only new / changed rows</text>
<text x="380" y="317" font-size="11" fill="#5F5E5A">· Append, merge, or overwrite</text>
<text x="380" y="333" font-size="11" fill="#5F5E5A">  by partition into target</text>
<text x="380" y="349" font-size="11" fill="#5F5E5A">· Efficient, scales well</text>

<!-- Divider -->
<line x1="340" y1="55" x2="340" y2="375" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 3"/>

</svg>
