<svg width="680" height="380" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#B4B2A9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Airflow orchestration container -->
<rect x="30" y="20" width="620" height="310" rx="12" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="6 4"/>
<text x="50" y="38" font-size="12" fill="#888780">Airflow DAG — scheduled batch job</text>

<!-- Column labels -->
<text x="120" y="50" font-size="12" fill="#5F5E5A" text-anchor="middle" font-weight="500">Extract</text>
<text x="340" y="122" font-size="12" fill="#5F5E5A" text-anchor="middle" font-weight="500">Process</text>
<text x="560" y="122" font-size="12" fill="#5F5E5A" text-anchor="middle" font-weight="500">Load</text>

<!-- ── Database ── -->
<rect x="55" y="60" width="130" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="120" y="82" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle" dominant-baseline="central">Database</text>
<text x="120" y="99" font-size="12" fill="#185FA5" text-anchor="middle" dominant-baseline="central">PostgreSQL / MySQL</text>

<!-- ── REST API ── -->
<rect x="55" y="150" width="130" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="120" y="172" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle" dominant-baseline="central">REST API</text>
<text x="120" y="189" font-size="12" fill="#185FA5" text-anchor="middle" dominant-baseline="central">Paginated pulls</text>

<!-- ── S3 ── -->
<rect x="55" y="240" width="130" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="120" y="262" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle" dominant-baseline="central">S3</text>
<text x="120" y="279" font-size="12" fill="#185FA5" text-anchor="middle" dominant-baseline="central">CSV / Parquet files</text>

<!-- Extract → Spark arrows -->
<line x1="185" y1="88" x2="270" y2="168" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="185" y1="178" x2="270" y2="178" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="185" y1="268" x2="270" y2="188" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ── Spark ── -->
<rect x="270" y="130" width="140" height="96" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="162" font-size="14" font-weight="500" fill="#3C3489" text-anchor="middle" dominant-baseline="central">Spark</text>
<text x="340" y="180" font-size="12" fill="#534AB7" text-anchor="middle" dominant-baseline="central">Transform · Join</text>
<text x="340" y="197" font-size="12" fill="#534AB7" text-anchor="middle" dominant-baseline="central">Aggregate · Clean</text>

<!-- Spark → Snowflake arrow -->
<line x1="410" y1="178" x2="490" y2="178" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ── Snowflake ── -->
<rect x="490" y="130" width="140" height="96" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="560" y="162" font-size="14" font-weight="500" fill="#085041" text-anchor="middle" dominant-baseline="central">Snowflake</text>
<text x="560" y="180" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">Target table</text>
<text x="560" y="197" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">MERGE / COPY INTO</text>

<!-- ── Airflow scheduler bar ── -->
<rect x="200" y="310" width="280" height="36" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="340" y="328" font-size="13" font-weight="500" fill="#633806" text-anchor="middle" dominant-baseline="central">Airflow scheduler — cron · retries · alerts</text>

<!-- Dashed orchestration lines -->
<path d="M260 310 L120 316 L120 296" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>
<path d="M340 310 L340 226" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>
<path d="M420 310 L560 310 L560 226" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>
</svg>
