<svg width="680" height="260" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Airflow DAG container -->
<rect x="30" y="20" width="620" height="220" rx="12" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="6 4"/>
<text x="50" y="38" font-size="12" fill="#888780">Airflow DAG — parallel tasks</text>

<!-- ── task_a ── -->
<rect x="100" y="65" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="180" y="87" font-size="14" font-weight="500" fill="#3C3489" text-anchor="middle" dominant-baseline="central">task_a</text>
<text x="180" y="104" font-size="12" fill="#534AB7" text-anchor="middle" dominant-baseline="central">Runs in parallel</text>

<!-- ── task_b ── -->
<rect x="100" y="145" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="180" y="167" font-size="14" font-weight="500" fill="#3C3489" text-anchor="middle" dominant-baseline="central">task_b</text>
<text x="180" y="184" font-size="12" fill="#534AB7" text-anchor="middle" dominant-baseline="central">Runs in parallel</text>

<!-- task_a → task_c -->
<line x1="260" y1="93" x2="400" y2="125" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- task_b → task_c -->
<line x1="260" y1="173" x2="400" y2="141" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ── task_c ── -->
<rect x="400" y="110" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="480" y="132" font-size="14" font-weight="500" fill="#085041" text-anchor="middle" dominant-baseline="central">task_c</text>
<text x="480" y="149" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">Runs after a &amp; b</text>

<!-- Parallel brace -->
<line x1="90" y1="60" x2="90" y2="210" stroke="#D3D1C7" stroke-width="1"/>
<line x1="90" y1="60" x2="100" y2="60" stroke="#D3D1C7" stroke-width="1"/>
<line x1="90" y1="210" x2="100" y2="210" stroke="#D3D1C7" stroke-width="1"/>
<text x="76" y="135" font-size="11" fill="#B4B2A9" text-anchor="middle" dominant-baseline="central" transform="rotate(-90,76,135)">parallel</text>

</svg>
