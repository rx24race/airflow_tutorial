name: Test Docker Multi-Arch Build

on:
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest        # amd64
            platform: linux/amd64
          - runner: ubuntu-24.04-arm     # arm64 — GitHub's native ARM runner
            platform: linux/arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker compose build

      - name: Test Java is working
        run: |
          docker compose run --rm airflow-tutorial java -version

      - name: Test JAVA_HOME is set correctly
        run: |
          docker compose run --rm airflow-tutorial bash -c 'echo JAVA_HOME=$JAVA_HOME && ls $JAVA_HOME'

      - name: Test Airflow is installed
        run: |
          docker compose run --rm airflow-tutorial bash -c "source /home/airflow/.venv/bin/activate && airflow version"
